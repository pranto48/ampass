name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.108.0)'
        required: true
        default: 'v1.107.0'

permissions:
  contents: write

jobs:
  build-extension:
    name: Package & Release Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('clients/browser-extension/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension version: $VERSION"

      - name: Validate extension manifest
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('clients/browser-extension/manifest.json'))
          assert m.get('manifest_version') == 3, 'Must be MV3'
          assert 'version' in m, 'Missing version'
          assert 'background' in m, 'Missing background'
          print('✅ manifest.json valid — version', m['version'])
          "

      - name: Package extension as ZIP
        run: |
          cd clients/browser-extension
          # Exclude dev/test-only files from the release zip
          zip -r ../../ampass-extension-${{ steps.version.outputs.version }}.zip \
            . \
            --exclude "test-pages/*" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --exclude "node_modules/*"
          echo "✅ Packaged ampass-extension-${{ steps.version.outputs.version }}.zip"

      - name: Copy CRX if present
        run: |
          if [ -f "clients/browser-extension.crx" ]; then
            cp clients/browser-extension.crx ampass-extension-${{ steps.version.outputs.version }}.crx
            echo "✅ Included .crx"
          else
            echo "ℹ️  No .crx found — skipping"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: AMPass v${{ steps.version.outputs.version }}
          body: |
            ## AMPass Browser Extension v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `ampass-extension-${{ steps.version.outputs.version }}.zip`
            2. Open Chrome → `chrome://extensions`
            3. Enable **Developer mode** (top right toggle)
            4. Click **Load unpacked** and select the extracted folder

            ### Or install the `.crx` (if provided)
            1. Download the `.crx` file
            2. Drag it onto `chrome://extensions`

            ### Connecting to your AMPass server
            After installing, click the AMPass icon → enter your server URL (e.g. `https://ampass.arif.bd`) → Sign In.

            ---
            > ⚠️ This extension has not been professionally audited. Use at your own risk.
          draft: false
          prerelease: false
          files: |
            ampass-extension-${{ steps.version.outputs.version }}.zip
            ampass-extension-${{ steps.version.outputs.version }}.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
