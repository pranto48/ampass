<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMPass</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="url(#sg)"/><path d="M16 8L10 12v4c0 4.4 2.6 8.5 6 10 3.4-1.5 6-5.6 6-10v-4l-6-4z" fill="white" opacity="0.9"/><defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
        <span>AMPass</span>
      </div>
      <nav class="sidebar-nav" id="navItems">
        <a href="#" class="nav-item active" data-view="vault">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Vault
        </a>
        <a href="#" class="nav-item" data-view="generator">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4"/></svg>
          Generator
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="btnLock" class="btn-lock" title="Lock Vault">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Lock
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Status Bar -->
      <div id="statusBar" class="status-bar" style="display:none;"></div>

      <!-- Setup View -->
      <div id="viewSetup" class="view view-center" style="display:none;">
        <div class="auth-card">
          <svg width="48" height="48" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="url(#ag)"/><path d="M16 8L10 12v4c0 4.4 2.6 8.5 6 10 3.4-1.5 6-5.6 6-10v-4l-6-4z" fill="white" opacity="0.9"/><defs><linearGradient id="ag" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
          <h2>Connect to AMPass Server</h2>
          <p class="text-muted">Enter your AMPass server URL to get started.</p>
          <input type="url" id="setupUrl" class="input" placeholder="https://yourdomain.com/ampass">
          <button id="btnSetupSave" class="btn btn-primary">Connect</button>
        </div>
      </div>

      <!-- Login View -->
      <div id="viewLogin" class="view view-center" style="display:none;">
        <div class="auth-card">
          <h2>Sign In</h2>
          <p class="text-muted">Enter your AMPass credentials</p>
          <input type="text" id="loginUser" class="input" placeholder="Username or email" autocomplete="off">
          <input type="password" id="loginPass" class="input" placeholder="Password" autocomplete="off">
          <button id="btnLogin" class="btn btn-primary">Sign In</button>
          <div id="loginError" class="error-msg" style="display:none;"></div>
        </div>
      </div>

      <!-- Unlock View -->
      <div id="viewUnlock" class="view view-center" style="display:none;">
        <div class="auth-card">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <h2>Unlock Vault</h2>
          <p class="text-muted">Enter your master password</p>
          <input type="password" id="unlockPass" class="input" placeholder="Master password" autocomplete="off">
          <button id="btnUnlock" class="btn btn-primary">Unlock</button>
          <div id="unlockError" class="error-msg" style="display:none;"></div>
        </div>
      </div>

      <!-- Vault View -->
      <div id="viewVault" class="view" style="display:none;">
        <div class="view-header">
          <h1>Vault</h1>
          <div class="header-actions">
            <button id="btnSync" class="btn btn-ghost btn-sm" title="Sync">↻ Sync</button>
          </div>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" class="input" placeholder="Search vault...">
        </div>
        <div id="vaultList" class="vault-list"></div>
        <div id="vaultEmpty" class="empty-state" style="display:none;">
          <p>No items in your vault.</p>
        </div>
      </div>

      <!-- Generator View -->
      <div id="viewGenerator" class="view" style="display:none;">
        <div class="view-header"><h1>Password Generator</h1></div>
        <div class="gen-output">
          <input type="text" id="genPassword" class="input mono" readonly>
          <button id="btnCopyGen" class="btn btn-ghost btn-sm">Copy</button>
        </div>
        <div class="gen-strength"><div id="genStrengthFill" class="gen-strength-fill"></div></div>
        <div class="gen-controls">
          <label>Length: <span id="genLenVal">20</span></label>
          <input type="range" id="genLen" min="8" max="64" value="20">
          <label><input type="checkbox" id="genUpper" checked> Uppercase</label>
          <label><input type="checkbox" id="genLower" checked> Lowercase</label>
          <label><input type="checkbox" id="genNums" checked> Numbers</label>
          <label><input type="checkbox" id="genSyms" checked> Symbols</label>
        </div>
        <button id="btnRegen" class="btn btn-primary">Generate New</button>
      </div>

      <!-- Settings View -->
      <div id="viewSettings" class="view" style="display:none;">
        <div class="view-header"><h1>Settings</h1></div>
        <div class="settings-section">
          <h3>Connection</h3>
          <p class="text-muted" id="settingsServerUrl">Not connected</p>
        </div>
        <div class="settings-section">
          <h3>Data</h3>
          <button id="btnExport" class="btn btn-ghost">Export Encrypted Backup</button>
          <button id="btnImport" class="btn btn-ghost">Import Backup</button>
          <button id="btnWipe" class="btn btn-danger">Wipe Local Data</button>
        </div>
        <div class="settings-section">
          <h3>Account</h3>
          <button id="btnLogout" class="btn btn-ghost">Logout & Disconnect</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/crypto.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
